        <script>

            function filterGallery(category) {
                const images = document.querySelectorAll('.gallery img');
                images.forEach(image => {
                    const imageCategory = image.getAttribute('data-category');
                    if (category === 'all' || imageCategory === category) {
                        image.style.display = 'block';
                    } else {
                        image.style.display = 'none';
                    }
                });
            }

            document.addEventListener('DOMContentLoaded', function () {
                const images = document.querySelectorAll('.gallery img');

                images.forEach(image => {
                    // Check if the image has a stored mean color
                    const storedMeanColor = localStorage.getItem(image.src);

                    if (storedMeanColor) {
                        // Apply the stored mean color
                        image.style.background = storedMeanColor;
                    } else {
                        // If no stored mean color, calculate and apply it after the image has loaded
                        image.addEventListener('load', function () {
                            const meanColor = fillBlankSpacesWithMeanColor(this);
                            // Store the mean color in local storage
                            localStorage.setItem(image.src, meanColor);
                            // Apply the mean color after the image has loaded
                            this.style.background = meanColor;
                        });
                    }
                });

                function fillBlankSpacesWithMeanColor(image) {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');

                    const targetWidth = image.width;
                    const targetHeight = image.height;

                    canvas.width = targetWidth;
                    canvas.height = targetHeight;

                    context.drawImage(image, 0, 0, targetWidth, targetHeight);

                    const imageData = context.getImageData(0, 0, targetWidth, targetHeight);
                    const data = imageData.data;

                    let sumRed = 0;
                    let sumGreen = 0;
                    let sumBlue = 0;

                    for (let i = 0; i < data.length; i += 4) {
                        sumRed += data[i];
                        sumGreen += data[i + 1];
                        sumBlue += data[i + 2];
                    }

                    const meanRed = Math.round(sumRed / (data.length / 4));
                    const meanGreen = Math.round(sumGreen / (data.length / 4));
                    const meanBlue = Math.round(sumBlue / (data.length / 4));

                    // Use rgba with alpha set to 0.5 for semi-transparent background
                    const meanColor = `rgba(${meanRed}, ${meanGreen}, ${meanBlue}, 0.5)`;

                    return meanColor;
                }
            });
        </script>
